<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lina Cormier — Web Designer & Infographiste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Lina Cormier — Portfolio
   Light brutalist · Swiss grid · cobalt accent
   ============================================================ */

:root {
  --ink: #0a0a0a;
  --ink-soft: #1a1a1a;
  --ink-mute: #6b6b66;
  --ink-faint: #a8a89f;
  --paper: #f4f4f1;
  --paper-warm: #ecebe5;
  --line: #d8d7cf;
  --line-soft: #e6e5dd;
  --accent: #0040ff;
  --accent-hover: #0030cc;

  --f-sans: "Helvetica Neue", "Helvetica", "Arial", sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;

  --pad-x: clamp(24px, 5vw, 80px);
  --pad-y: clamp(40px, 6vw, 96px);
  --gap: clamp(16px, 1.6vw, 28px);

  --ease-brut: cubic-bezier(0.7, 0, 0.2, 1);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

button {
  font: inherit;
  color: inherit;
  background: none;
  border: 0;
  padding: 0;
  cursor: pointer;
}

img { display: block; max-width: 100%; }

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ----- Header ----------------------------------------------- */
.hdr {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px var(--pad-x);
  background: rgba(244, 244, 241, 0.85);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
  border-bottom: 1px solid var(--line-soft);
}

.hdr-mark {
  display: flex;
  align-items: center;
  gap: 10px;
}

.hdr-mark-dot {
  width: 10px;
  height: 10px;
  background: var(--accent);
  display: inline-block;
}

.hdr-mark-text {
  font-family: var(--f-sans);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: -0.005em;
}

.hdr-nav {
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

.hdr-link {
  color: var(--ink-mute);
  transition: color 0.2s var(--ease-brut);
}
.hdr-link.is-active { color: var(--ink); }
.hdr-link:hover { color: var(--ink); }

.hdr-sep { color: var(--ink-faint); }
.hdr-meta { color: var(--ink-mute); }

.hdr-portrait {
  position: relative;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  overflow: visible;
  cursor: pointer;
  margin-left: 6px;
  flex-shrink: 0;
}
.hdr-portrait img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
  filter: grayscale(0.05);
  transition: filter 0.3s var(--ease-brut), transform 0.3s var(--ease-brut);
}
.hdr-portrait-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.3s var(--ease-brut), transform 0.3s var(--ease-brut);
}
.hdr-portrait:hover img { filter: grayscale(0); transform: scale(0.95); }
.hdr-portrait:hover .hdr-portrait-ring { opacity: 1; transform: scale(1); }

/* ----- Hero portrait button -------------------------------- */
.hero-portrait {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 16px 10px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.5);
  cursor: pointer;
  transition: border-color 0.3s var(--ease-brut), background 0.3s var(--ease-brut), transform 0.3s var(--ease-brut), color 0.3s var(--ease-brut);
}
.hero-portrait:hover {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--paper);
  transform: translateY(-2px);
}
.hero-portrait-img {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  display: block;
  background: var(--paper-warm);
}
.hero-portrait-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s var(--ease-brut);
}
.hero-portrait:hover .hero-portrait-img img { transform: scale(1.08); }
.hero-portrait-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.hero-portrait-arrow { display: inline-block; transition: transform 0.3s var(--ease-brut); }
.hero-portrait:hover .hero-portrait-arrow { transform: translateX(4px); }

@media (max-width: 720px) {
  .hero-portrait { margin-left: 0; }
}

/* ----- About page ------------------------------------------ */
.about {
  padding: clamp(32px, 4vw, 56px) var(--pad-x) var(--pad-y);
  max-width: 1280px;
  margin: 0 auto;
  width: 100%;
}
.about-grid {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: clamp(40px, 6vw, 88px);
  padding: clamp(24px, 4vw, 56px) 0 clamp(60px, 7vw, 100px);
  border-bottom: 1px solid var(--line);
  align-items: start;
}
@media (max-width: 900px) {
  .about-grid { grid-template-columns: 1fr; }
}
.about-portrait {
  position: relative;
  aspect-ratio: 4 / 5;
  background: var(--paper-warm);
  border: 1px solid var(--line);
  overflow: hidden;
  max-width: 380px;
}
.about-portrait img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.02);
}
.about-portrait-tag {
  position: absolute;
  left: 14px;
  bottom: 14px;
  display: grid;
  gap: 2px;
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 8px 12px;
  font-family: var(--f-mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.about-portrait-tag-key { color: var(--ink-mute); }
.about-portrait-tag-val { color: var(--ink); font-weight: 500; }

.about-text { display: grid; gap: 28px; }
.about-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.about-eyebrow .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
}
.about-title {
  font-size: clamp(32px, 4.4vw, 56px);
  font-weight: 500;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin: 0;
  text-wrap: balance;
}
.about-title em { font-style: italic; font-weight: 400; color: var(--accent); }
.about-bio p {
  font-size: clamp(16px, 1.2vw, 18px);
  line-height: 1.6;
  color: var(--ink-soft);
  max-width: 56ch;
  margin: 0 0 1em;
}
.about-bio strong { color: var(--ink); font-weight: 500; }
.about-cta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 6px;
}
.btn-primary, .btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: none;
  border: 1px solid transparent;
  transition: transform 0.2s var(--ease-brut), background 0.2s var(--ease-brut), color 0.2s var(--ease-brut), border-color 0.2s var(--ease-brut);
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
.btn-secondary { background: transparent; color: var(--ink); border-color: var(--line); }
.btn-secondary:hover { border-color: var(--ink); background: var(--ink); color: var(--paper); }

.about-section {
  padding: clamp(48px, 6vw, 80px) 0;
  border-bottom: 1px solid var(--line);
}
.about-section:last-child { border-bottom: 0; }
.about-section .kicker { margin-bottom: 24px; }

.timeline {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 28px;
}
.timeline li {
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 24px;
  padding-top: 20px;
  border-top: 1px solid var(--line-soft);
}
.timeline-time {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  padding-top: 4px;
}
.timeline-body h3 {
  margin: 0 0 4px;
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.005em;
}
.timeline-org {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}
.timeline-body p {
  margin: 0;
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink-soft);
  max-width: 60ch;
}
@media (max-width: 720px) {
  .timeline li { grid-template-columns: 1fr; gap: 8px; }
}

.about-section-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 48px;
}
.about-section-grid > div { padding: 0; border-bottom: 0; }
.about-section-grid .kicker { margin-bottom: 16px; }
@media (max-width: 720px) {
  .about-section-grid { grid-template-columns: 1fr; gap: 32px; }
}
.tag-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 0;
}
.tag-list li {
  font-size: 14px;
  padding: 8px 0;
  border-top: 1px solid var(--line-soft);
}
.tag-list li:last-child { border-bottom: 1px solid var(--line-soft); }

/* ----- Stage / page transition ------------------------------ */
.stage {
  flex: 1;
  position: relative;
  isolation: isolate;
}

.curtain {
  position: fixed;
  left: 0;
  right: 0;
  background: var(--ink);
  z-index: 30;
  pointer-events: none;
  transform: scaleY(0);
}
.curtain-top { top: 0; height: 50vh; transform-origin: top; }
.curtain-bot { bottom: 0; height: 50vh; transform-origin: bottom; }

.stage-leaving .curtain { transform: scaleY(1); transition: transform 0.36s var(--ease-brut); }
.stage-leaving .page { opacity: 0; transition: opacity 0.2s var(--ease-brut); }

.stage-entering .curtain { transform: scaleY(0); transition: transform 0.42s var(--ease-brut); }
.stage-entering .page { opacity: 1; animation: pageIn 0.6s var(--ease-brut); }

@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.page { will-change: opacity, transform; }

/* ----- Home / Hero ------------------------------------------ */
.home {
  padding: 0 var(--pad-x) var(--pad-y);
}

.hero {
  padding: clamp(60px, 10vw, 140px) 0 clamp(48px, 7vw, 96px);
  border-bottom: 1px solid var(--line);
  display: grid;
  gap: 36px;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

.hero-eyebrow .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  animation: pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.35; }
}

.hero-title {
  font-family: var(--f-sans);
  font-size: clamp(38px, 6.4vw, 96px);
  font-weight: 500;
  line-height: 1.02;
  letter-spacing: -0.035em;
  margin: 0;
  max-width: 18ch;
  text-wrap: balance;
}

.hero-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}

.hero-foot {
  display: flex;
  flex-wrap: wrap;
  gap: 36px 56px;
  margin-top: 16px;
}

.hero-foot-col {
  display: grid;
  gap: 4px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.hero-foot-key { color: var(--ink-mute); }
.hero-foot-val { color: var(--ink); font-weight: 500; }

/* ----- Grid ------------------------------------------------- */
.grid {
  display: grid;
  gap: var(--gap);
  margin-top: clamp(40px, 5vw, 64px);
  grid-auto-flow: dense;
}

.grid-cols-2 { grid-template-columns: repeat(2, 1fr); }
.grid-cols-3 { grid-template-columns: repeat(3, 1fr); }
.grid-cols-4 { grid-template-columns: repeat(4, 1fr); }

@media (max-width: 720px) {
  .grid-cols-2, .grid-cols-3, .grid-cols-4 {
    grid-template-columns: 1fr;
  }
}
@media (min-width: 721px) and (max-width: 1024px) {
  .grid-cols-3, .grid-cols-4 { grid-template-columns: repeat(2, 1fr); }
}

/* ----- Card ------------------------------------------------- */
.card {
  position: relative;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 14px;
  animation: cardIn 0.6s var(--ease-brut) both;
  animation-delay: calc(var(--card-index) * 60ms);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-media {
  position: relative;
  aspect-ratio: 4 / 3;
  overflow: hidden;
  background: var(--card-bg, var(--paper-warm));
  border: 1px solid var(--line);
}

.card-lg .card-media { aspect-ratio: 4 / 3; }
.card-md .card-media { aspect-ratio: 4 / 3; }
.card-sm .card-media { aspect-ratio: 4 / 3; }

.card-img-wrap {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.card-img-wrap img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.7s var(--ease-brut), filter 0.4s var(--ease-brut);
}

.card:hover .card-img-wrap img {
  transform: scale(1.04);
}

/* Outline on hover */
.card-media::after {
  content: "";
  position: absolute;
  inset: 0;
  border: 1px solid transparent;
  pointer-events: none;
  transition: border-color 0.3s var(--ease-brut);
  z-index: 3;
}
.card:hover .card-media::after {
  border-color: var(--ink);
}

.card-overlay {
  position: absolute;
  inset: auto 0 0 0;
  padding: 18px;
  display: flex;
  justify-content: flex-end;
  z-index: 2;
  pointer-events: none;
}

.card-cta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--accent);
  color: #fff;
  padding: 10px 14px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transform: translateY(8px);
  opacity: 0;
  transition: transform 0.35s var(--ease-brut), opacity 0.3s var(--ease-brut);
}

.card:hover .card-cta {
  transform: translateY(0);
  opacity: 1;
}

.card-cta-arrow {
  display: inline-block;
  transition: transform 0.35s var(--ease-brut);
}
.card:hover .card-cta-arrow {
  transform: translateX(4px);
}

.card-meta {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 4px 12px;
}

.card-meta-row {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  font-family: var(--f-mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

.card-num { color: var(--ink); }

.card-title {
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0;
}

.card-year {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--ink-mute);
  letter-spacing: 0.04em;
}

/* ----- Project detail --------------------------------------- */
.detail {
  padding: clamp(32px, 4vw, 56px) var(--pad-x) var(--pad-y);
  max-width: 1440px;
  margin: 0 auto;
  width: 100%;
}

.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: clamp(40px, 6vw, 80px);
  transition: color 0.2s var(--ease-brut), gap 0.2s var(--ease-brut);
}
.detail-back:hover { color: var(--ink); gap: 12px; }

.detail-head {
  display: grid;
  gap: 24px;
  padding-bottom: clamp(40px, 5vw, 72px);
  border-bottom: 1px solid var(--line);
}

.detail-num {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

.detail-title {
  font-size: clamp(48px, 9vw, 140px);
  font-weight: 500;
  line-height: 0.95;
  letter-spacing: -0.04em;
  margin: 0;
  text-wrap: balance;
}

.detail-summary {
  font-size: clamp(18px, 1.6vw, 22px);
  line-height: 1.4;
  max-width: 50ch;
  color: var(--ink-soft);
  margin: 0;
  text-wrap: balance;
}

.detail-facts {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 28px;
  padding: clamp(32px, 4vw, 56px) 0;
  margin: 0;
  border-bottom: 1px solid var(--line);
}

.detail-facts > div { display: grid; gap: 6px; }

.detail-facts dt {
  font-family: var(--f-mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}

.detail-facts dd {
  margin: 0;
  font-size: 15px;
  letter-spacing: -0.005em;
  line-height: 1.4;
}

@media (max-width: 720px) {
  .detail-facts { grid-template-columns: repeat(2, 1fr); }
}

.detail-hero {
  margin-top: clamp(40px, 5vw, 72px);
  background: var(--paper-warm);
  border: 1px solid var(--line);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 380px;
}

.detail-hero img {
  width: 100%;
  height: auto;
  display: block;
  max-height: 80vh;
  object-fit: contain;
}

.detail-body {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 56px;
  padding: clamp(48px, 6vw, 96px) 0;
}

@media (max-width: 720px) {
  .detail-body { grid-template-columns: 1fr; gap: 24px; }
}

.detail-body-wide {
  padding: clamp(48px, 6vw, 96px) 0;
}
.detail-body-wide-cols {
  columns: 2;
  column-gap: clamp(40px, 5vw, 72px);
}
.detail-body-wide-cols p {
  font-size: 14.5px;
  line-height: 1.65;
  letter-spacing: -0.002em;
  color: var(--ink-soft);
  margin: 0 0 1.1em;
  break-inside: avoid;
}
.detail-body-wide-cols p:last-child { margin-bottom: 0; }
@media (max-width: 720px) {
  .detail-body-wide-cols { columns: 1; }
}

.kicker {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 12px;
}

.tool-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 6px;
}
.tool-list li {
  font-family: var(--f-mono);
  font-size: 12px;
  padding: 6px 0;
  border-top: 1px solid var(--line-soft);
}
.tool-list li:last-child { border-bottom: 1px solid var(--line-soft); }

.detail-body-main p {
  font-size: clamp(18px, 1.4vw, 21px);
  line-height: 1.55;
  letter-spacing: -0.005em;
  max-width: 56ch;
  margin: 0 0 1em;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--gap);
  margin-bottom: clamp(48px, 6vw, 96px);
}

.detail-grid:has(> :nth-child(2)) {
  grid-template-columns: repeat(2, 1fr);
}

.detail-grid-cell {
  background: var(--paper-warm);
  border: 1px solid var(--line);
  overflow: hidden;
  display: flex;

/* ---------- NEX e-learning — arborescence du site (sitemap tree) ------- */
.sitemap-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  padding: 8px 4px 16px;
  -webkit-overflow-scrolling: touch;
}
.tree { display: inline-block; min-width: 100%; text-align: center; white-space: nowrap; }
.tree ul {
  display: flex;
  justify-content: center;
  padding: 30px 0 0;
  margin: 0;
  position: relative;
  list-style: none;
}
.tree li {
  list-style: none;
  margin: 0;
  padding: 30px 12px 0;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.tree li::before, .tree li::after {
  content: "";
  position: absolute;
  top: 0;
  right: 50%;
  width: 50%;
  height: 30px;
  border-top: 1.5px solid var(--line);
}
.tree li::after {
  right: auto;
  left: 50%;
  border-left: 1.5px solid var(--line);
}
.tree li:only-child::before, .tree li:only-child::after { display: none; }
.tree li:only-child { padding-top: 30px; }
.tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
.tree li:last-child::before { border-right: 1.5px solid var(--line); border-radius: 0 6px 0 0; }
.tree li:first-child::after { border-radius: 6px 0 0 0; }
.tree ul ul::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  width: 0;
  height: 30px;
  border-left: 1.5px solid var(--line);
}
.tree > ul { padding-top: 0; }
.tree > ul > li:only-child { padding-top: 0; }

.snode {

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

// ----- Cover carousel (auto-rotating gallery) -------------------------------
function CoverCarousel({ images, alt }) {
  const [active, setActive] = useState(0);
  useEffect(() => {
    const id = setInterval(() => {
      setActive((a) => (a + 1) % images.length);
    }, 2800);
    return () => clearInterval(id);
  }, [images.length]);
  return (
    <div className="cover-carousel">
      {images.map((src, i) => (
        <img
          key={src}
          src={asset(src)}
          alt={alt}
          className={"cover-slide " + (i === active ? "is-active" : "")}
          loading={i === 0 ? "eager" : "lazy"}
        />
      ))}
      <div className="cover-dots" aria-hidden="true">
        {images.map((_, i) => (
          <button
            key={i}
            className={"cover-dot " + (i === active ? "is-active" : "")}
            onClick={(e) => { e.stopPropagation(); setActive(i); }}
          />
        ))}
      </div>
    </div>
  );
}

// ----- Product carousel (manuel, images empilées) --------------------------
function ProductCarousel({ images, alt }) {
  const [i, setI] = useState(0);
  const n = images.length;
  const go = (d) => setI((p) => (p + d + n) % n);
  return (
    <div className="pcar">
      {images.map((src, k) => (
        <img
          key={src}
          src={asset(src)}
          alt={alt}
          className={"pcar-img " + (k === i ? "is-active" : "")}
          loading={k === 0 ? "eager" : "lazy"}
        />
      ))}
      <button className="pcar-arrow pcar-prev" onClick={() => go(-1)} aria-label="Image précédente">←</button>
      <button className="pcar-arrow pcar-next" onClick={() => go(1)} aria-label="Image suivante">→</button>
      <div className="pcar-count">{String(i + 1).padStart(2, "0")} / {String(n).padStart(2, "0")}</div>
    </div>
  );
}

// ----- Before / after retouch slider ---------------------------------------
function BeforeAfter({ before, after, alt, beforeLabel = "Avant", afterLabel = "Après" }) {
  const [pos, setPos] = useState(50);
  const ref = useRef(null);
  const update = (clientX) => {
    const el = ref.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    let p = ((clientX - r.left) / r.width) * 100;
    setPos(Math.max(0, Math.min(100, p)));
  };
  const onDown = (e) => {
    e.preventDefault();
    const getX = (ev) => (ev.touches ? ev.touches[0].clientX : ev.clientX);
    update(getX(e.nativeEvent));
    const move = (ev) => update(getX(ev));
    const up = () => {
      window.removeEventListener("pointermove", move);
      window.removeEventListener("pointerup", up);
    };
    window.addEventListener("pointermove", move);
    window.addEventListener("pointerup", up);
  };
  return (
    <div className="ba" ref={ref} onPointerDown={onDown}>
      <img className="ba-after" src={asset(after)} alt={alt + " — retouché"} draggable="false" />
      <img className="ba-before" src={asset(before)} alt={alt + " — original"} draggable="false" style={{ clipPath: `inset(0 ${100 - pos}% 0 0)` }} />
      <span className="ba-label is-before">{beforeLabel}</span>
      <span className="ba-label is-after">{afterLabel}</span>
      <div className="ba-divider" style={{ left: pos + "%" }}></div>
      <div className="ba-knob" style={{ left: pos + "%" }}>
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
          <path d="M11 8l-3 4 3 4" /><path d="M14 8l3 4-3 4" />
        </svg>
      </div>
    </div>
  );
}

function ReelCard({ video, index }) {
  const [unmuted, setUnmuted] = React.useState(false);
  const num = String(index + 1).padStart(2, "0");
  // Always-playing muted loop. Click = reload with sound.
  const baseSrc = `https://www.youtube-nocookie.com/embed/${video.id}?autoplay=1&loop=1&playlist=${video.id}&controls=0&modestbranding=1&playsinline=1&rel=0&showinfo=0&iv_load_policy=3&disablekb=1`;
  const mutedSrc = baseSrc + "&mute=1";
  const soundSrc = baseSrc + "&mute=0";

  return (
    <div
      className={`reel-card ${unmuted ? "is-playing" : ""}`}
      onClick={() => setUnmuted(true)}
      title={video.title}
    >
      <div className="reel-iframe-wrap">
        <iframe
          key={unmuted ? "sound" : "muted"}
          src={unmuted ? soundSrc : mutedSrc}
          title={video.title}
          allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowFullScreen
          frameBorder="0"
          referrerPolicy="strict-origin-when-cross-origin"
        />
      </div>
      <div className="reel-overlay">
        <span className="reel-num">{num} / Reel</span>
        {!unmuted && (
          <span className="reel-sound">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="currentColor"/>
              <line x1="23" y1="9" x2="17" y2="15"/>
              <line x1="17" y1="9" x2="23" y2="15"/>
            </svg>
            Cliquer pour le son
          </span>
        )}
      </div>
    </div>
  );
}

// ----- App ------------------------------------------------------------------
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "columns": 3
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useState({ name: "home" });
  const [transition, setTransition] = useState("idle");
  const pendingRoute = useRef(null);

  const navigate = (r) => {
    if (transition !== "idle") return;
    if (r.name === route.name && r.id === route.id) return;
    pendingRoute.current = r;
    setTransition("leaving");
  };

  useEffect(() => {
    if (transition === "leaving") {
      const t = setTimeout(() => {
        setRoute(pendingRoute.current);
        window.scrollTo({ top: 0, behavior: "instant" });
        setTransition("entering");
      }, 360);
      return () => clearTimeout(t);
    }
    if (transition === "entering") {
      const t = setTimeout(() => setTransition("idle"), 480);
      return () => clearTimeout(t);
    }
  }, [transition]);

  return (
    <div className="app">
      <Header route={route} onNavigate={navigate} />

      <main className={"stage stage-" + transition}>
        <div className="curtain curtain-top" aria-hidden="true"></div>
        <div className="curtain curtain-bot" aria-hidden="true"></div>

        <div className="page" key={route.name + (route.id || "")}>
          {route.name === "home" && (
            <Home
              onOpen={(id) => navigate({ name: "project", id })}
              onAbout={() => navigate({ name: "about" })}
              columns={tweaks.columns}
            />
          )}
          {route.name === "project" && (
            <ProjectDetail
              id={route.id}
              onBack={() => navigate({ name: "home" })}
              onOpen={(id) => navigate({ name: "project", id })}
            />
          )}
          {route.name === "about" && (
            <About onBack={() => navigate({ name: "home" })} />
          )}
        </div>
      </main>

      <footer className="ftr">
        <div className="ftr-row">
          <span>© Lina Cormier — 2026</span>
          <span className="ftr-mid">lina_crm13@hotmail.com</span>
          <span>Paris · Île-de-France</span>
        </div>
      </footer>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Grille">
          <TweakRadio
            label="Colonnes"
            value={tweaks.columns}
            options={[
              { value: 2, label: "2" },
              { value: 3, label: "3" },
              { value: 4, label: "4" },
            ]}
            onChange={(v) => setTweak("columns", v)}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
